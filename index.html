<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Decoder</title>
</head>
<body>
    <div class="container">
        <h1>To decode what you received</h1>
        <h5>Open on a laptop for better readability</h5>
        <h3>Enter the text and your dob below</h3>
        <div>
            <label for="text-input">Enter text:</label>
            <input type="text" id="textInput" name="textInput" placeholder="Type encoded text...">
        </div>
        <div>
            <label for="dob">Enter DOB:</label>
            <input type="date" name="dob" id="dob">
        </div>
        <button class="submit">Get</button>
        <p class="decodedTextBox">Decoded Text</p>
    </div>
</body>
<script>
    document.querySelector('.submit').addEventListener('click', function() {
        const inputText = document.getElementById('textInput').value;
        const dob = document.getElementById('dob').value.replace(/-/g, '');
        
        function decode(text, key, salt) {
            key = key + salt;

            let shifts = key.repeat(Math.floor(text.length / key.length)) +
                        key.slice(0, text.length % key.length);

            let result = "";

            for (let i = 0; i < shifts.length; i++) {
                let shift = parseInt(shifts[i]) + 1;
                result += String.fromCharCode(text.charCodeAt(i) - shift);
            }

            return result;
    
        }

        document.querySelector('.decodedTextBox').textContent = decode(inputText, dob, "20041210");

    });
</script>
</html>
